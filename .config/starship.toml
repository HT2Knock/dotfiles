"$schema" = 'https://starship.rs/config-schema.json'

format = """$directory$character"""
right_format = """$all"""
add_newline = true
command_timeout = 1000

[cmd_duration]
disabled = true

[package]
disabled = true

[os]
disabled = false

[character]
success_symbol = "[](bold blue) "
error_symbol = "[🙄](bold red)"
vimcmd_symbol = "[](bold blue) "

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = " "

[git_status]
disabled = true

[nodejs]
style = "blue"
symbol = " "

[bun]

[golang]
style = "blue"
symbol = " "
